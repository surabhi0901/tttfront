<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; font-size: 3em; cursor: pointer; background: #eee; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
        .info { font-size: 1.2em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="info" id="status">Waiting for connection...</div>
    <div class="board" id="board"></div>

    <script>
        // Replace with your actual backend WebSocket URL once deployed
        const wsUrl = "wss://YOUR_BACKEND_URL/ws"; 
        let ws;

        function connect() {
            ws = new WebSocket(wsUrl);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById("status").innerText = 
                    `Players: ${data.players}/2 | Turn: ${data.turn}`;
                
                const cells = document.querySelectorAll(".cell");
                data.board.forEach((mark, index) => {
                    cells[index].innerText = mark;
                });
            };
        }

        function createBoard() {
            const boardDiv = document.getElementById("board");
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.onclick = () => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ action: "move", index: i }));
                    }
                };
                boardDiv.appendChild(cell);
            }
        }

        createBoard();
        connect();
    </script>
</body>
</html>
