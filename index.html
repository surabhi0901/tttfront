<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; font-size: 3em; cursor: pointer; background: #eee; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; }
        .info { font-size: 1.2em; margin-bottom: 10px; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>
    <div class="info" id="status">Waiting for connection...</div>
    <div class="board" id="board"></div>
    <div class="controls">
        <button onclick="resetGame()">Restart Game</button>
    </div>

    <script>
        const wsUrl = "wss://tttback.onrender.com/ws"; 
        let ws;
        let mySymbol = null;

        function connect() {
            ws = new WebSocket(wsUrl);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === "init") {
                    mySymbol = data.symbol;
                    return;
                }

                if (data.type === "state") {
                    let statusText = `Players: ${data.players}/2 | You are: ${mySymbol} | `;
                    
                    if (data.winner) {
                        statusText += data.winner === "Draw" ? "It's a Draw!" : `Player ${data.winner} Wins!`;
                    } else {
                        statusText += `Turn: ${data.turn}`;
                    }
                    
                    document.getElementById("status").innerText = statusText;
                    
                    const cells = document.querySelectorAll(".cell");
                    data.board.forEach((mark, index) => {
                        cells[index].innerText = mark;
                    });
                }
            };
        }

        function createBoard() {
            const boardDiv = document.getElementById("board");
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.onclick = () => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ action: "move", index: i }));
                    }
                };
                boardDiv.appendChild(cell);
            }
        }

        function resetGame() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "reset" }));
            }
        }

        createBoard();
        connect();
    </script>
</body>
</html>
